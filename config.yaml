# Adversarial-review module configuration.
#
# Loader contract: see the top-level agent-os repo's
# projects/cfg/SPEC.md (CFG pack). This file is the module-level layer in
# the resolution order:
#   code defaults → THIS FILE → top-level config.yaml → *.local.yaml
#   → env vars → CLI flags
#
# The top-level /Users/airlock/agent-os/config.yaml (when `roles.*` is set
# there) overrides values in this file per SPEC §10.2.
#
# Module files MUST NOT declare `version:` — that's the top-level lock.
# Strict schema is enforced by src/config-loader.mjs; unknown keys fail
# loud at startup.

# §10.2 alias: when the operator pins `roles.merge_agent_worker_class` at
# the top level, that value is the canonical truth — this module's
# `merge_agent.worker_class` resolves to the same value via the alias.
# The loader fails loud if both are set with different values.
__aliases:
  merge_agent.worker_class: roles.merge_agent_worker_class

# GMW-02 — Gemini always-on third reviewer. `always-on` (operator default)
# selects gemini as the reviewer for [claude-code] / [codex] / [clio-agent]
# PRs; `fallback` selects gemini only when the assigned primary reviewer is
# quota-capped (reusing the HRR quota-exhaustion signal); `off` preserves the
# pre-GMW claude↔codex routing. Gemini NEVER reviews a [gemini]-built PR.
# Env override: ADVERSARIAL_REVIEW_GEMINI_REVIEWER_MODE / AGENT_OS_REVIEWER_GEMINI_MODE.
# Runtime defaults to the direct Gemini CLI. Set `runtime: antigravity` to use
# the Antigravity account pool; watcher boot refuses that mode unless at least
# one account is listed below. Token files may be literal filesystem paths or
# op:// secret refs resolved by the launch wrapper; never place token contents
# in this file.
# Env overrides:
#   AGENT_OS_REVIEWER_GEMINI_RUNTIME / ADVERSARIAL_REVIEW_GEMINI_RUNTIME
#   AGENT_OS_REVIEWER_GEMINI_ANTIGRAVITY_ACCOUNTS /
#     ADVERSARIAL_REVIEW_GEMINI_ANTIGRAVITY_ACCOUNTS
# The accounts env value is a JSON array, e.g.
#   [{"id":"primary","tokenFile":"op://vault/item/token"}]
reviewer:
  gemini:
    mode: off                       # enum: off / fallback / always-on
    runtime: cli                    # enum: cli / antigravity
    antigravity:
      accounts: []                  # ordered list of {id, tokenFile}

# Role pins. Canonical home is the top-level config.yaml; these are the
# module-internal defaults when the operator hasn't pinned a value there.
# CFG-02 wires resolvers for these three knobs to consult this file FIRST,
# then env override LAST.
roles:
  reviewer: adversarial             # enum: claude-code / codex / claude (legacy alias for claude-code) / gemini / adversarial
  remediator: adversarial           # enum: claude-code / codex / adversarial
  merge-agent:
    fallback_path: none
  claude-reviewer-lacey:
    fallback_path: none
  codex-reviewer-lacey:
    fallback_path: none
  merge-agent-failure-recovery:
    fallback_path: none

# Codex reviewer ACPX discovery:
#   ACPX_CLI > `acpx` on PATH > AGENT_OS_OPENCLAW_INSTALL_ROOT /
#   openclaw.install_root > ~/.openclaw
openclaw:
  install_root: /Users/airlock/.openclaw   # cfg-allowlist: production-host-default — ACPX default install root until host-specific top-level config overrides it

agent_control:
  codex_runaway_guardrails:
    vocabulary_fatigue_window_commits: 5
    vocabulary_fatigue_min_repeats: 3

# Merge-agent worker class. Aliased above to roles.merge_agent_worker_class
# so the operator can pin from the top level OR from this file (but not
# both with different values — the loader fails loud on conflict).
merge_agent:
  worker_class: merge-agent         # enum: merge-agent / codex / claude-code

# CFG-02 round-1 review B5 fix (2026-05-30): the previously-shipped
# `merge_agent.final_pass_on_request_changes`, `remediation.max_concurrent_jobs`,
# `reviewer.timeout_ms`, `reviewer.fallback_threshold`, and
# `watcher.alert_to_op_ref` sections were declared in this file and
# schema-enforced, but no resolver code read them — the corresponding env
# vars (MERGE_AGENT_FINAL_PASS_ON_REQUEST_CHANGES, ADVERSARIAL_REMEDIATION_MAX_CONCURRENT_JOBS,
# REVIEWER_TIMEOUT_MS, REVIEWER_FALLBACK_THRESHOLD, ALERT_TO_OP_REF) were
# still the only operator surface. Reviewer flagged this as a footgun: an
# operator editing `config.local.yaml` would silently see their change
# ignored. Per the reviewer's suggested fix, drop the unwired sections
# until a follow-up CFG ticket wires the file→env cascade for each
# section. The schemaV1 dropdown still accepts these keys (so this file
# can re-introduce them once a resolver consumes them) but they no longer
# appear in the shipped defaults to avoid the footgun.
feature_flags:
  # Lets merge-agent take the final pass after round budget is exhausted on
  # Request changes verdicts.
  # Default true because the legacy OFF behavior stranded PRs at the operator desk.
  # Motivation: PRs #426 and #504 convergence-loop deadlock notes in follow-up-merge-agent.mjs.
  merge_agent_final_pass_on_request_changes: true
  # Allows the watcher to start without ALERT_TO being provisioned.
  # Default false because degraded alert-free startup must be an explicit choice.
  # Motivation: adversarial-watcher degraded bring-up path / CFG-05.
  allow_missing_alert_to: false

apps:
  adversarial-review:
    mode: agent-os
    subscribes:
      - health.worker.*
      - token.*

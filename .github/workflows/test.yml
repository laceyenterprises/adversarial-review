name: Test

# Runs the kernel + adapter test suite on every pull request and every push
# to main. The test suite is fixture-driven and does not require network
# access, a real GitHub bot token, or a Linear API key — see
# `demo/research-finding-walkthrough.sh` for the offline-runnable end-to-end
# path that mirrors the same byte-stable contracts the CI here exercises.

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Cancel superseded runs on the same branch so a fast-follow push doesn't
# burn CI minutes on an already-stale commit. Manual reruns from the UI
# are unaffected.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: npm test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      # Run the suite against every Node major the package.json `engines`
      # range advertises support for. If a version starts failing here, the
      # right fix is either a code change or a deliberate `engines` bump in
      # package.json — not silent removal from this matrix.
      fail-fast: false
      matrix:
        node:
          - '20'
          - '22'
    steps:
      # Third-party actions are pinned to commit SHAs, not version tags.
      # This protects us from a tag-repoint supply-chain attack: if the
      # `v4` tag on actions/checkout is ever moved (intentionally or by
      # compromise), CI here continues to use the exact commit that was
      # vetted. Dependabot's github-actions ecosystem (see
      # .github/dependabot.yml) tracks SHA bumps and proposes weekly
      # updates as PRs so the pin stays current.
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # `npm ci` is preferred over `npm install` so the lockfile is honored
        # exactly and an out-of-date lockfile fails CI loudly rather than
        # silently drifting.
        run: npm ci

      - name: Run CDM review-gate re-derivation guard
        # CDM-07AR: verdict/head/mergeability gate facts must come from
        # `src/adversarial-gate-status.mjs`, not be re-derived by consumers.
        # Allowlisted exceptions stay visible in the uploaded JSON artifact.
        run: |
          node scripts/audit-cdm-rederivation.mjs \
            --strict \
            --format json \
            --out /tmp/cdm-rederivation-audit.json

      - name: Upload CDM re-derivation audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: cdm-rederivation-audit-${{ matrix.node }}-${{ github.sha }}
          path: /tmp/cdm-rederivation-audit.json
          if-no-files-found: warn

      - name: Run kernel + adapter test suite
        # `npm test` invokes `node --test test/*.test.mjs test/adapters/*.test.mjs`.
        # The suite includes byte-equivalence assertions on JSONL transcripts,
        # which catch accidental delivery-key drift, timestamp instability,
        # and unordered JSON.
        run: npm test

      - name: Typecheck contracts
        # The `src/kernel/contracts.d.ts` declarations are the public adapter
        # contract. They're typechecked separately so a contract drift fails
        # CI even when the runtime `.mjs` modules still parse.
        run: npm run typecheck:contracts

      - name: Run offline end-to-end demo
        # The demo proves the documented five-minute new-contributor path
        # actually works against the same kernel/adapter contracts the unit
        # tests exercise. It builds a temporary fixture, drives the markdown
        # subject through reviewer → verdict parser → remediation reply
        # parser → JSONL transcript → re-review → convergence, and exits
        # non-zero on any invariant violation.
        run: bash demo/research-finding-walkthrough.sh

      - name: Run fallback canary (fixture)
        # ARC-09: drive a synthetic review through the `local` outage-lifeline
        # runtime against a fixture reviewer. Proves the runtime port +
        # admission + verdict-parse + status-file + alerting path all still
        # work — a green canary here means the lifeline harness has not rotted.
        # Hermetic: no CLI spawn, no network. The daily production canary
        # (launchd) is the `--live` counterpart on the watcher host.
        run: node scripts/adversarial-runtime-canary.mjs --root "$RUNNER_TEMP/canary" --fixture

      - name: Run failover drill (sandboxed)
        # ARC-09: exercise the ARC-07 health router through a full kill →
        # failover → restore → resume → reconcile cycle in an in-memory fixture
        # harness, asserting automatic failover, automatic resume, and ZERO
        # duplicate dispatches on resume. NEVER contacts a live OS endpoint.
        run: node scripts/adversarial-runtime-failover-drill.mjs --root "$RUNNER_TEMP/drill"
